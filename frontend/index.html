<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SQL Console</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <h1>SQL Console</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      
      <!-- Panel de ejecución -->
      <div id="sqlConsole">
        <h2>Ejecutar Query</h2>
        <textarea id="sqlInput" placeholder="Escribe tu query SQL aqui...&#10;Ej: SELECT * FROM items;"></textarea>
        <div class="button-group">
          <button onclick="executeSql()">Ejecutar</button>
          <button onclick="clearInput()">Limpiar</button>
        </div>
        <div id="queryResult"></div>
      </div>

      <!-- Panel de historial -->
      <div id="historyPanel">
        <h2>Historial de Queries</h2>
        <div class="button-group">
          <button onclick="clearHistory()" style="background: #d9534f;">Limpiar Historial</button>
        </div>
        <div id="historyList"></div>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
